version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ui_testing_software
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ui_testing_software"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  migrate:
    build:
      context: ./backend
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://user:password@db:5432/ui_testing_software
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    depends_on:
      - migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://user:password@db:5432/ui_testing_software
    networks:
      - app_network

volumes:
  pg_data:

networks:
  app_network:
    driver: bridge
